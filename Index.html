<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Training APP</title>
    <link rel="stylesheet" href="app.css">
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div class="Homepage">
        <div class="header-row">
            <div class="logo">
                <div class="box1"></div>
                <div class="box2"></div>
                <div class="box3"></div>
            </div>
            <div class="brand">
                <h1>agriauto</h1>
                <p>STAMPING COMPANY (Pvt.) Ltd</p>
            </div>
        </div>
        <div class="text">
            <h2>Welcome to the Training App</h2>
            <p>This is a simple application to help you track your training progress.</p>
        </div>
    </div>
    <div class="home-buttons">
            <button type="button" id="newEntryBtn">New Entry</button>
            <button type="button" id="showAllBtn">Show All Entries</button>
    </div>
    <div id="newEntrySection" class="section">
        <h2>NEW ENTRY</h2>
        <div class="entryform">
            <div class="input-group employname">
                <input type="text" id="name" name="name" required>
                <label for="name">Employee Name</label>
            </div>
            <div class="input-group employid">
                <input type="text" id="id" name="id" required>
                <label for="id">Employee ID</label>
            </div>
            <div class="input-group department">
                <input type="text" id="department" name="department" required>
                <label for="department">Department</label>
            </div>
            <div class="input-group designation">
                <input type="text" id="designation" name="designation" required>
                <label for="designation">Designation</label>
            </div>
        </div>
        <div class="submit">
                <button type="submit">Add Entry</button>
        </div>
    </div>

     <div id="showAllSection" class="section">
         <h2>SHOW ALL ENTRIES</h2>
         <div id="datesContainer" class="dates-container">
             <!-- Dates will be listed here, clickable to expand -->
         </div>
         <div class="submit">
                 <button type="button" id="backToHomeBtn">Back to Home</button>
         </div>
     </div>
    <script src="app.js"></script>
</body>
</html>
